mysql:
  enabled: true
  image:
    repository: docker.io/library/mysql
    pullPolicy: IfNotPresent
    tag: "5.7"
  rootPassword: "yourpassword"
  host: "mysql"
  port: "3306"
  database: "ts"
  user: "root"
  password: "yourpassword"
  maxConnections: 1024
  persistence:
    enabled: false
    # existingClaim: mysql-pvc
  service:
    type: NodePort
    port: 3306
    # nodePort: 30306

# RabbitMQ Configuration
rabbitmq:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    pullPolicy: IfNotPresent
    tag: "4.0.7-debian-12-r0"
  fullnameOverride: "rabbitmq"
  podLabels: { app: ts-rabbitmq }
  auth:
    username: guest # Using the default RabbitMQ username
    password: guest # Using the default RabbitMQ password
    erlangCookie: "RABBITMQCOOKIE" # A simple cookie value
  service:
    type: ClusterIP
  persistence:
    enabled: false # Disabling persistence makes it stateless
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1000m
  metrics:
    enabled: false

# Loadgenerator Configuration
loadgenerator:
  enabled: true
  image:
    repository: docker.io/opspai/loadgenerator
    pullPolicy: IfNotPresent
    tag: "022"
  fullnameOverride: "loadgenerator"
  baseURL: "http://ts-ui-dashboard:8080"
  opentelemetry:
    endpoint: "otel-collector:4317"
  config:
    threads: 2
    sleep: 100
    debug: false
  waitForServices:
    enabled: true
    timeout: 600
    checkInterval: 1
    services:
      - name: ts-auth-service
        port: 8080
        path: "/api/v1/auth"
